# kustomize/base/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../kubernetes-manifests/adservice.yaml
  - ../../kubernetes-manifests/cartservice.yaml
  - ../../kubernetes-manifests/checkoutservice.yaml
  - ../../kubernetes-manifests/currencyservice.yaml
  - ../../kubernetes-manifests/emailservice.yaml
  - ../../kubernetes-manifests/frontend.yaml
  - ../../kubernetes-manifests/loadgenerator.yaml
  - ../../kubernetes-manifests/paymentservice.yaml
  - ../../kubernetes-manifests/productcatalogservice.yaml
  - ../../kubernetes-manifests/recommendationservice.yaml
  - ../../kubernetes-manifests/shippingservice.yaml
  - ../../kubernetes-manifests/redis.yaml

---
# kustomize/staging/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: boutique-staging
namePrefix: staging-
resources:
  - ../base
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1       # Staging: 1 replica per service
images:
  - name: frontend
    newName: ghcr.io/myorg/online-boutique/frontend
    newTag: ""         # Populated by pipeline

---
# kustomize/production/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: boutique-production
resources:
  - ../base
patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3       # Production: HA replicas
  - target:
      kind: Deployment
      name: checkoutservice
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
images:
  - name: frontend
    newName: ghcr.io/myorg/online-boutique/frontend
    newTag: ""