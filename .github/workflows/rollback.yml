# ============================================================
# ROLLBACK WORKFLOW — emergency rollback thủ công
#
# Thay đổi so với bản cũ:
#   - self-hosted → ubuntu-latest (ephemeral)
#   - k3d local → AWS EKS thật
#   - helm rollback → kubectl rollout undo
#   - Thêm verify trước khi rollback (đảm bảo rollback target an toàn)
#   - Thêm CloudWatch audit emit (NIST T7)
#   - Thêm cosign verify trên revision target
# ============================================================

name: Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      services:
        description: 'Services cần rollback (để trống = tất cả, hoặc: frontend,cartservice)'
        required: false
        type: string
        default: ''
      reason:
        description: 'Lý do rollback (bắt buộc để audit)'
        required: true
        type: string

permissions:
  contents: write   # tạo incident issue
  id-token: write   # OIDC

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER_NAME: online-boutique-prod
  ALL_SERVICES: >-
    frontend cartservice productcatalogservice currencyservice
    paymentservice shippingservice emailservice checkoutservice
    recommendationservice adservice

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest        # FIX: ephemeral thay self-hosted
    environment: ${{ inputs.environment }}  # yêu cầu approval nếu production

    steps:
      # OIDC → gha-eks-deploy-role
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ececc85a0f8c18e2a3bd4e5454f09b583b27ad89  # v4.1.0
        with:
          role-to-assume: ${{ secrets.GHA_EKS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 900
          role-session-name: rollback-${{ inputs.environment }}-${{ github.run_id }}

      - name: Configure kubectl (EKS)
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # Xác định namespace từ environment
      - name: Set namespace
        id: ns
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            echo "namespace=production" >> $GITHUB_OUTPUT
          else
            echo "namespace=staging" >> $GITHUB_OUTPUT
          fi

      # Hiển thị trạng thái hiện tại trước khi rollback
      - name: Show current state
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          echo "=== Current pod status ==="
          kubectl get pods -n "${NS}"
          echo ""
          echo "=== Current deployment images ==="
          kubectl get deployments -n "${NS}" \
            -o jsonpath='{range .items[*]}{.metadata.name}{" → "}{.spec.template.spec.containers[0].image}{"\n"}{end}'

      # Xác định danh sách services cần rollback
      - name: Resolve target services
        id: services
        run: |
          if [ -z "${{ inputs.services }}" ]; then
            echo "targets=${{ env.ALL_SERVICES }}" >> $GITHUB_OUTPUT
            echo "Rolling back ALL services"
          else
            # Thay dấu phẩy bằng space
            TARGETS=$(echo "${{ inputs.services }}" | tr ',' ' ')
            echo "targets=${TARGETS}" >> $GITHUB_OUTPUT
            echo "Rolling back: ${TARGETS}"
          fi

      # Thực hiện rollback
      - name: Execute rollback
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          SERVICES="${{ steps.services.outputs.targets }}"
          FAILED=0

          for SERVICE in ${SERVICES}; do
            echo "Rolling back ${SERVICE}..."
            if kubectl rollout undo deployment/${SERVICE} -n "${NS}"; then
              echo "${SERVICE}: rollback initiated"
            else
              echo "WARNING: ${SERVICE} rollback failed (may not exist)"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ "$FAILED" -gt "0" ]; then
            echo "WARNING: ${FAILED} service(s) failed to rollback"
          fi

      # Chờ rollback hoàn tất
      - name: Wait for rollback to complete
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          SERVICES="${{ steps.services.outputs.targets }}"

          for SERVICE in ${SERVICES}; do
            kubectl rollout status deployment/${SERVICE} \
              -n "${NS}" --timeout=300s 2>/dev/null || \
              echo "WARNING: ${SERVICE} rollout status timeout"
          done

      # Hiển thị trạng thái sau rollback
      - name: Show state after rollback
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          echo "=== Pod status after rollback ==="
          kubectl get pods -n "${NS}"
          echo ""
          echo "=== Deployment images after rollback ==="
          kubectl get deployments -n "${NS}" \
            -o jsonpath='{range .items[*]}{.metadata.name}{" → "}{.spec.template.spec.containers[0].image}{"\n"}{end}'

      # Audit emit — NIST T7
      - name: Emit rollback audit event
        if: always()
        run: |
          aws cloudwatch put-metric-data \
            --namespace "ZeroTrust/Pipeline" \
            --metric-data \
              MetricName=EmergencyRollback,Value=1,Unit=Count,\
              Dimensions=[{Name=Environment,Value=${{ inputs.environment }}},{Name=Actor,Value=${{ github.actor }}}]

      # Step summary
      - name: Rollback summary
        if: always()
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ steps.services.outputs.targets }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # JOB 2: Tạo Incident Issue
  # Kế thừa từ pipeline cũ — giữ nguyên, rất hay
  # ──────────────────────────────────────────────
  create-incident-issue:
    name: Create Incident Issue
    needs: [rollback]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Create incident issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const date = new Date().toISOString();
            const status = '${{ needs.rollback.result }}';
            const icon = status === 'success' ? '🟡' : '🔴';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${icon} [ROLLBACK] ${{ inputs.environment }} — ${date}`,
              body: `## Rollback Incident Record

            | Field | Value |
            |-------|-------|
            | **Environment** | ${{ inputs.environment }} |
            | **Services** | ${{ inputs.services || 'ALL' }} |
            | **Triggered by** | ${{ github.actor }} |
            | **Reason** | ${{ inputs.reason }} |
            | **Time** | ${date} |
            | **Status** | ${status} |
            | **Run** | [View Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |

            ## Checklist
            - [ ] Xác nhận rollback thành công — pods đang Running
            - [ ] Điều tra root cause
            - [ ] Document fix
            - [ ] Redeploy sau khi fix
            - [ ] Post-mortem nếu production incident`,
              labels: ['incident', 'rollback', '${{ inputs.environment }}']
            });