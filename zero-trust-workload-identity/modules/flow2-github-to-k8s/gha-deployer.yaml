# ============================================================
# FLOW 2: K8s RBAC cho GitHub Actions deployer
# Chuẩn: NSA K8s Hardening Guide §5
#         CIS EKS Benchmark 5.1.x
# ============================================================

---
# Role: deployer — chỉ update deployments namespace production
# Không có: secrets, cluster-level, delete
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gha-deployer-role
  namespace: production
  labels:
    standard: "NSA-K8s-Hardening-Guide-Section5"
    managed-by: "terraform"
rules:
  # Deployments — update image only
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "update", "patch"]
  # ReplicaSets — verify rollout
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  # Pods — health check sau deploy
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Services — verify endpoint
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list"]
  # KHÔNG có:
  # - secrets (không được đọc/ghi secrets)
  # - configmaps write (chỉ read nếu cần)
  # - cluster-level resources
  # - delete deployments

---
# RoleBinding: map gha-eks-deploy-role → deployer role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gha-deployer-binding
  namespace: production
  labels:
    standard: "NSA-K8s-Hardening-Guide-Section5"
subjects:
  - kind: User
    # Username map từ aws-auth ConfigMap
    name: "gha-deploy"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: gha-deployer-role
  apiGroup: rbac.authorization.k8s.io

---
# GitHub Actions Workflow — deploy.yml
# Tích hợp: OIDC + Cosign verify + kubectl scoped
# File này đặt tại: .github/workflows/deploy.yml
apiVersion: v1
kind: ConfigMap
metadata:
  name: gha-deploy-workflow-doc
  namespace: production
  annotations:
    note: "Tham khảo — workflow file thực tế ở .github/workflows/deploy.yml"
data:
  deploy.yml: |
    name: Deploy to Production

    on:
      push:
        branches: [main]

    permissions:
      id-token: write   # OIDC token
      contents: read    # Read repo

    jobs:
      # Gate: Manual approval trước khi deploy production
      approval:
        runs-on: ubuntu-latest
        environment: production  # GitHub Environment với required reviewer
        steps:
          - name: Await approval
            run: echo "Approved by ${{ github.actor }}"

      deploy:
        needs: approval
        runs-on: self-hosted  # Ephemeral runner
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          # OIDC → AWS STS (không có static key)
          - name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v4
            with:
              role-to-assume: arn:aws:iam::PROD_ACCOUNT:role/gha-eks-deploy-role
              aws-region: ap-southeast-1
              role-session-duration: 900  # 15 phút

          # Cosign verify image trước khi deploy
          # SLSA Level 3: non-falsifiable provenance
          - name: Verify image signature
            env:
              IMAGE: PROD_ACCOUNT.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique/frontend:${{ github.sha }}
            run: |
              cosign verify \
                --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
                --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
                $IMAGE

          # Get kubeconfig
          - name: Get EKS credentials
            run: |
              aws eks update-kubeconfig \
                --region ap-southeast-1 \
                --name zero-trust-production

          # Deploy — scoped namespace production only
          - name: Deploy to production
            run: |
              kubectl set image deployment/frontend \
                frontend=PROD_ACCOUNT.dkr.ecr.ap-southeast-1.amazonaws.com/online-boutique/frontend:${{ github.sha }} \
                -n production

          # Health check
          - name: Verify rollout
            run: |
              kubectl rollout status deployment/frontend \
                -n production \
                --timeout=300s
