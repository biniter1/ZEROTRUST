---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  namespace: production
  labels:
    app: emailservice
    app.kubernetes.io/part-of: online-boutique
spec:
  type: ClusterIP
  selector:
    app: emailservice
  ports:
    - name: grpc
      port: 5000 # services khác gọi vào port 5000
      targetPort: 8080 # K8s forward sang container port 8080
      protocol: TCP
