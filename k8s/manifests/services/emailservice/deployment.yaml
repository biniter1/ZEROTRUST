# ============================================================
# EMAILSERVICE — Deployment + Service + ServiceAccount
# Điểm đặc biệt:
#   - containerPort: 8080 (gRPC)
#   - servicePort: 5000 (port mà services khác gọi vào)
#   - containerPort ≠ servicePort — hiếm gặp
#   - SA có quyền dùng AWS SES để gửi email
# ============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: production
  labels:
    app: emailservice
    app.kubernetes.io/name: emailservice
    app.kubernetes.io/part-of: online-boutique
  annotations:
    security.policy/pss: "restricted"
    security.policy/standard: "NSA-K8s-v1.2, CIS-EKS-5.2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emailservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: emailservice
        app.kubernetes.io/name: emailservice
        app.kubernetes.io/part-of: online-boutique
    spec:
      serviceAccountName: emailservice-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: emailservice
          image: PLACEHOLDER_REGISTRY/online-boutique/emailservice@PLACEHOLDER_DIGEST
          ports:
            - name: grpc
              containerPort: 8080 # container lắng nghe 8080
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: emailservice
