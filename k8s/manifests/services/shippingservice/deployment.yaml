# ============================================================
# SHIPPINGSERVICE — Deployment + Service + ServiceAccount
# Go service, gRPC port 50051
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  namespace: production
  labels:
    app: shippingservice
    app.kubernetes.io/name: shippingservice
    app.kubernetes.io/part-of: online-boutique
  annotations:
    security.policy/pss: "restricted"
    security.policy/standard: "NSA-K8s-v1.2, CIS-EKS-5.2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shippingservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shippingservice
        app.kubernetes.io/name: shippingservice
        app.kubernetes.io/part-of: online-boutique
    spec:
      serviceAccountName: shippingservice-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shippingservice
          image: PLACEHOLDER_REGISTRY/online-boutique/shippingservice@PLACEHOLDER_DIGEST
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "50051"
            - name: DISABLE_PROFILER
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: shippingservice
