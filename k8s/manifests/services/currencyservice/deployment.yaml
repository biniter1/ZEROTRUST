# ============================================================
# CURRENCYSERVICE — Deployment + Service + ServiceAccount
# Node.js service, không có gì đặc biệt
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  namespace: production
  labels:
    app: currencyservice
    app.kubernetes.io/name: currencyservice
    app.kubernetes.io/part-of: online-boutique
  annotations:
    security.policy/pss: "restricted"
    security.policy/standard: "NSA-K8s-v1.2, CIS-EKS-5.2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currencyservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: currencyservice
        app.kubernetes.io/name: currencyservice
        app.kubernetes.io/part-of: online-boutique
    spec:
      serviceAccountName: currencyservice-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: currencyservice
          image: PLACEHOLDER_REGISTRY/online-boutique/currencyservice@PLACEHOLDER_DIGEST
          ports:
            - name: grpc
              containerPort: 7000
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "7000"
            - name: DISABLE_PROFILER
              value: "1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            grpc:
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            grpc:
              port: 7000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: currencyservice
