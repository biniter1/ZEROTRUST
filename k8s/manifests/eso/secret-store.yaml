# ============================================================
# CLUSTER SECRET STORE
#
# SecretStore là gì?
#   Cấu hình kết nối đến nguồn secret bên ngoài
#   Giống như "địa chỉ" của AWS Secrets Manager
#
# ClusterSecretStore vs SecretStore:
#   SecretStore      = chỉ dùng được trong 1 namespace
#   ClusterSecretStore = dùng được từ mọi namespace
#   → Dùng ClusterSecretStore để production + staging đều dùng được
#
# Auth: EKS Pod Identity
#   ESO pod có ServiceAccount được map với IAM Role
#   IAM Role có quyền đọc secrets trong AWS Secrets Manager
#   Không cần static credentials — đúng Zero Trust
#
# IAM Role này đã được tạo trong Layer 1 Flow 3 (Terraform)
# ============================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
