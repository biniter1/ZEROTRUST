# ============================================================
# EXTERNAL SECRETS — cho các services cần secret
#
# ExternalSecret là gì?
#   CRD (Custom Resource) nói với ESO:
#   "Hãy lấy secret X từ AWS Secrets Manager
#    và tạo K8s Secret Y với nội dung đó"
#
# Không phải tất cả 10 services đều cần secret:
#   cartservice      → Redis endpoint (ElastiCache)
#   paymentservice   → Payment gateway API key
#   emailservice     → SES credentials (nếu không dùng IAM role)
#   checkoutservice  → Không cần (dùng service-to-service)
#   Còn lại         → Không cần secret AWS
#
# Naming convention trong AWS Secrets Manager:
#   prod/cart/redis-addr
#   prod/payment/api-key
#   prod/email/smtp-password (nếu cần)
#
# Phải tạo secrets này trong AWS Secrets Manager TRƯỚC khi apply:
#   aws secretsmanager create-secret \
#     --name prod/cart/redis-addr \
#     --secret-string '{"redis_addr":"clustercfg.xxx.cache.amazonaws.com:6379"}'
# ============================================================

# ── CARTSERVICE: Redis endpoint ───────────────────────────────
# cartservice cần địa chỉ ElastiCache Redis
# Địa chỉ này thay đổi khi tạo lại cluster → lưu trong Secrets Manager

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cart-redis-secret
  namespace: production
spec:
  # refreshInterval: ESO sync lại secret mỗi bao lâu
  # 1h = đủ nhanh để catch rotation mà không gây quá nhiều API calls
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: cart-redis-secret
    creationPolicy: Owner

  data:
    - secretKey: redis_addr
      remoteRef:
        key: prod/cart/redis-addr # tên secret trong AWS Secrets Manager
        property: redis_addr # field trong JSON secret

---
# ── PAYMENTSERVICE: API key ───────────────────────────────────
# Payment gateway cần API key để xử lý giao dịch
# Đây là secret nhạy cảm nhất — rotate định kỳ trong AWS

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-secret
  namespace: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payment-secret
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: prod/payment/api-key
        property: api_key
---
# ── STAGING: giống production nhưng dùng secret staging ───────

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cart-redis-secret
  namespace: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: cart-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: redis_addr
      remoteRef:
        key: staging/cart/redis-addr # staging dùng secret riêng
        property: redis_addr

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-secret
  namespace: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payment-secret
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: staging/payment/api-key # staging dùng test API key
        property: api_key
