# ============================================================
# RBAC — Layer 3 bổ sung
#
# Layer 1 đã làm:
#   - aws-auth ConfigMap: map IAM Role → K8s Group
#   - 6 Permission Sets trong IAM Identity Center
#   - Role/RoleBinding cho human identity
#
# Layer 3 bổ sung:
#   1. Xác nhận cluster-admin không được bind thường xuyên
#   2. Break-glass ClusterRoleBinding (tạm thời khi khẩn cấp)
#   3. RBAC cho system components: Kyverno, ESO, Falco
#   4. Read-only ClusterRole cho SOC monitoring
#
# Nguyên tắc Least Privilege:
#   Mỗi Role chỉ có đúng quyền cần thiết
#   Không có wildcard "*" trong production
#   Không có cluster-admin binding thường xuyên
#
# Chuẩn: NSA K8s §5 · CIS EKS 5.1.x · NIST 800-207 T3
# ============================================================

# ── PHẦN 1: XÁC NHẬN KHÔNG CÓ CLUSTER-ADMIN THƯỜNG XUYÊN ────
#
# Tại sao cluster-admin nguy hiểm?
#   cluster-admin = quyền làm MỌI THỨ trên cluster
#   Nếu account bị compromise → attacker có toàn quyền
#   Zero Trust: không ai cần quyền đó thường xuyên
#
# Layer 1 đã setup:
#   AdminAccess SSO Role → k8s-admins group → cluster-admin
#   Nhưng chỉ khi Admin login qua SSO với MFA (session 1h)
#   Sau 1h session hết → quyền tự mất
#
# KHÔNG tạo ClusterRoleBinding cluster-admin cho user thường xuyên
# Phần dưới chỉ có break-glass procedure

# ── PHẦN 2: BREAK-GLASS PROCEDURE ────────────────────────────
#
# Break-glass = "bể kính khẩn cấp"
# Dùng khi: cluster bị lỗi nghiêm trọng, SSO không hoạt động
# Cách dùng:
#   1. Admin chạy script bên dưới
#   2. Có quyền cluster-admin trong 1 giờ
#   3. Script tự xóa binding sau 1 giờ
#   4. Mọi hành động được ghi vào CloudTrail + K8s audit log

# ClusterRoleBinding này KHÔNG được apply thường xuyên
# Chỉ apply khi khẩn cấp, xóa ngay sau khi xong
# File này là TEMPLATE — không kubectl apply trực tiếp

# apiVersion: rbac.authorization.k8s.io/v1
# kind: ClusterRoleBinding
# metadata:
