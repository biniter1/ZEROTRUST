# Nhận từ: chỉ frontend
# Gọi đến: productcatalog

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: recommendationservice-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: recommendationservice
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 8080
          protocol: TCP

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: productcatalogservice
      ports:
        - port: 3550
          protocol: TCP

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# ── POLICY 10: ADSERVICE ─────────────────────────────────────
# Nhận từ: chỉ frontend
# Không gọi đi đâu cả (isolated nhất)

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adservice-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: adservice
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 9555
          protocol: TCP

  egress:
    # adservice gửi metrics lên CloudWatch
    - ports:
        - port: 443
          protocol: TCP

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
